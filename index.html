<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subscribe Popup</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
 
  <!-- Checkbox controla visibilidade do popup -->
  <input type="checkbox" id="close-toggle" class="close-input" />
 
  <!-- Popup fixo no canto inferior direito -->
  <div class="popup">
 
    <!-- Botão fechar (X) -->
    <label for="close-toggle" class="close-btn" aria-label="Fechar">&#x2715;</label>
 
    <div class="popup-body">
 
      <!-- Logo do canal -->
      <div class="logo">
        <span class="logo-text">CL</span>
      </div>
 
      <!-- Informações -->
      <div class="info">
        <h2 class="channel-name">CodingLab</h2>
        <p class="channel-desc">Subscribe Our YouTube Channel</p>
        <a href="#" class="subscribe-btn">Subscribe</a>
      </div>
 
    </div>
  </div>
 
</body>
</html>
